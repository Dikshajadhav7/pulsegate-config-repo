server.port=8080

spring.application.name=api-gateway

eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.instance.prefer-ip-address=true

management.endpoints.web.exposure.include=*

spring.cloud.gateway.server.webflux.discovery.locator.enabled=true
spring.cloud.gateway.server.webflux.discovery.locator.lower-case-service-id=true

spring.cloud.gateway.server.webflux.routes[0].id=auth-service
spring.cloud.gateway.server.webflux.routes[0].uri=lb://AUTH-SERVICE
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/api/auth/**

spring.cloud.gateway.server.webflux.routes[1].id=probe-service
spring.cloud.gateway.server.webflux.routes[1].uri=lb://PROBE-SERVICE
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/api/probes/**

spring.cloud.gateway.server.webflux.routes[2].id=probe-results
spring.cloud.gateway.server.webflux.routes[2].uri=lb://PROBE-SERVICE
spring.cloud.gateway.server.webflux.routes[2].predicates[0]=Path=/api/results/**